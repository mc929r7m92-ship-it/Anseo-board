<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>안서동 감정 게시판</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: rgba(255,255,255,0.07);
    --text: #e8e4dc;
    --muted: #6b6a72;
    --accent: #f0c040;
    --accent2: #7eb8d4;
    --error: #e07070;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Gowun Dodum', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG stars */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
    animation: twinkle var(--d, 3s) var(--delay, 0s) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.1; transform: scale(0.8); }
    to   { opacity: 0.7; transform: scale(1.2); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeDown 0.7s ease forwards;
  }
  .header-sub {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .header-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 32px;
    color: var(--accent);
    line-height: 1.2;
    margin-bottom: 8px;
  }
  .header-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.8;
  }

  /* COUNTER */
  .counter-bar {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 28px;
    animation: fadeDown 0.7s 0.1s ease both;
  }
  .counter-item {
    text-align: center;
    padding: 10px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .counter-num {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 22px;
    color: var(--accent);
  }
  .counter-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  /* INPUT SECTION */
  .input-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 24px;
    animation: fadeDown 0.7s 0.2s ease both;
  }

  .input-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }

  /* EMOJI TAGS */
  .emoji-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }
  .emoji-btn {
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .emoji-btn:hover { border-color: var(--accent); }
  .emoji-btn.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: #1a1209;
    font-weight: 700;
  }

  /* TEXT INPUT */
  .text-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  textarea {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    padding: 10px 14px;
    resize: none;
    height: 68px;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: rgba(240,192,64,0.4); }
  textarea::placeholder { color: var(--muted); }

  .submit-btn {
    padding: 10px 18px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 15px;
    color: #1a1209;
    cursor: pointer;
    height: 68px;
    min-width: 56px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .submit-btn:hover { background: #f5d060; transform: scale(1.03); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .char-count {
    text-align: right;
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* STATUS MSG */
  .status-msg {
    text-align: center;
    font-size: 13px;
    padding: 8px;
    border-radius: 8px;
    margin-top: 10px;
    display: none;
  }
  .status-msg.show { display: block; }
  .status-msg.ok { background: rgba(126,184,212,0.15); color: var(--accent2); }
  .status-msg.err { background: rgba(224,112,112,0.15); color: var(--error); }

  /* WORD CLOUD */
  .cloud-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 24px;
    animation: fadeDown 0.7s 0.3s ease both;
    min-height: 100px;
  }
  .section-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .cloud-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    min-height: 60px;
  }
  .cloud-word {
    padding: 4px 10px;
    border-radius: 20px;
    color: var(--bg);
    font-weight: 700;
    animation: popIn 0.4s ease;
  }
  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  /* POSTS */
  .posts-section { animation: fadeDown 0.7s 0.4s ease both; }
  .posts-list { display: flex; flex-direction: column; gap: 10px; }

  .post-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    animation: slideIn 0.4s ease;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  @keyframes slideIn {
    from { transform: translateY(12px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  .post-emoji { font-size: 22px; flex-shrink: 0; margin-top: 2px; }
  .post-body { flex: 1; }
  .post-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 6px;
    word-break: keep-all;
  }
  .post-meta {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 8px;
  }
  .post-tag {
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 700;
  }

  /* LOADING */
  .loading-dots {
    display: inline-flex;
    gap: 4px;
  }
  .loading-dots span {
    width: 5px; height: 5px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1s var(--d) ease-in-out infinite;
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  .empty-state {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 20px;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
  <div class="header">
    <p class="header-sub">버스정류장 · 안서동</p>
    <h1 class="header-title">지금 어때요?</h1>
    <p class="header-desc">기다리는 동안 한 마디만 남겨줘요<br>익명이에요 — 아무도 몰라요 🤫</p>
  </div>

  <div class="counter-bar">
    <div class="counter-item">
      <div class="counter-num" id="totalCount">0</div>
      <div class="counter-label">총 감정</div>
    </div>
    <div class="counter-item">
      <div class="counter-num" id="todayCount">0</div>
      <div class="counter-label">오늘</div>
    </div>
    <div class="counter-item">
      <div class="counter-num" id="topEmoji">—</div>
      <div class="counter-label">최다 감정</div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-section">
    <p class="input-label">지금 기분이 어때요?</p>
    <div class="emoji-grid" id="emojiGrid">
      <button class="emoji-btn" data-emoji="😊" data-label="기분좋음">😊 좋아</button>
      <button class="emoji-btn" data-emoji="😤" data-label="짜증남">😤 짜증</button>
      <button class="emoji-btn" data-emoji="😴" data-label="졸림">😴 졸려</button>
      <button class="emoji-btn" data-emoji="😰" data-label="걱정됨">😰 걱정</button>
      <button class="emoji-btn" data-emoji="😌" data-label="평온함">😌 평온</button>
      <button class="emoji-btn" data-emoji="🤩" data-label="설렘">🤩 설레</button>
      <button class="emoji-btn" data-emoji="😢" data-label="슬픔">😢 슬퍼</button>
      <button class="emoji-btn" data-emoji="🤔" data-label="고민중">🤔 고민</button>
    </div>
    <div class="text-row">
      <textarea id="msgInput" placeholder="오늘 하루 한 마디... (선택)" maxlength="60"></textarea>
      <button class="submit-btn" id="submitBtn" onclick="submitPost()">↑</button>
    </div>
    <div class="char-count"><span id="charNum">0</span>/60</div>
    <div class="status-msg" id="statusMsg"></div>
  </div>

  <!-- WORD CLOUD -->
  <div class="cloud-section">
    <p class="section-title">🌐 지금 안서동 분위기</p>
    <div class="cloud-wrap" id="cloudWrap">
      <div class="empty-state">첫 감정을 남겨주세요</div>
    </div>
  </div>

  <!-- POSTS -->
  <div class="posts-section">
    <p class="section-title" style="margin-bottom:12px;">💬 최근 감정들</p>
    <div class="posts-list" id="postsList">
      <div class="empty-state">아직 아무도 없어요 — 첫 번째가 돼요!</div>
    </div>
  </div>
</div>

<script>
// ── DATA STORE (in-memory) ──────────────────────────────
let posts = [];
let selectedEmoji = null;
let selectedLabel = null;
let isSubmitting = false;

const COLORS = ['#f0c040','#7eb8d4','#a8d8a0','#f4a07a','#c4a0d0','#80c8c0','#f08080','#b0c4de'];
const COLOR_MAP = {
  '😊':'#f0c040','😤':'#f08080','😴':'#b0c4de','😰':'#7eb8d4',
  '😌':'#a8d8a0','🤩':'#f4a07a','😢':'#c4a0d0','🤔':'#80c8c0'
};

// ── STARS ───────────────────────────────────────────────
(function makeStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --d:${2+Math.random()*4}s;
      --delay:${Math.random()*3}s;
      width:${Math.random()<0.3?3:2}px;
      height:${Math.random()<0.3?3:2}px;
    `;
    c.appendChild(s);
  }
})();

// ── EMOJI SELECT ────────────────────────────────────────
document.querySelectorAll('.emoji-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedEmoji = btn.dataset.emoji;
    selectedLabel = btn.dataset.label;
  });
});

// ── CHAR COUNT ──────────────────────────────────────────
const msgInput = document.getElementById('msgInput');
msgInput.addEventListener('input', () => {
  document.getElementById('charNum').textContent = msgInput.value.length;
});

// ── MODERATION via Claude API ────────────────────────────
async function moderate(text) {
  if (!text.trim()) return { ok: true };
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 100,
        system: `너는 한국 동네 감정 게시판의 콘텐츠 필터야. 
사용자 입력이 욕설, 혐오, 광고, 개인정보, 의미없는 스팸이면 {"ok":false,"reason":"이유"} 반환.
일반적인 일상 감정 표현이면 {"ok":true} 반환.
반드시 JSON만 반환, 설명 없이.`,
        messages: [{ role: 'user', content: text }]
      })
    });
    const data = await res.json();
    const raw = data.content?.[0]?.text || '{"ok":true}';
    return JSON.parse(raw.replace(/```json|```/g, '').trim());
  } catch {
    return { ok: true }; // fail open
  }
}

// ── SUBMIT ───────────────────────────────────────────────
async function submitPost() {
  if (!selectedEmoji) {
    showStatus('감정 태그를 먼저 선택해주세요 😊', 'err');
    return;
  }
  if (isSubmitting) return;

  const text = msgInput.value.trim();
  if (text.length > 0 && text.length < 3) {
    showStatus('조금 더 써주세요 (3자 이상)', 'err');
    return;
  }

  isSubmitting = true;
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="loading-dots"><span style="--d:0s"></span><span style="--d:0.2s"></span><span style="--d:0.4s"></span></div>';

  // moderation
  if (text) {
    const check = await moderate(text);
    if (!check.ok) {
      showStatus(`⚠️ ${check.reason || '적절하지 않은 내용이에요'}`, 'err');
      resetBtn();
      return;
    }
  }

  // add post
  const now = new Date();
  const timeStr = now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
  posts.unshift({
    emoji: selectedEmoji,
    label: selectedLabel,
    text: text || '',
    time: timeStr,
    date: now.toDateString(),
    color: COLOR_MAP[selectedEmoji] || COLORS[0]
  });

  // reset
  msgInput.value = '';
  document.getElementById('charNum').textContent = '0';
  document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
  selectedEmoji = null;
  selectedLabel = null;

  renderAll();
  showStatus('감정이 안서동에 날아갔어요 ✈️', 'ok');
  resetBtn();
}

function resetBtn() {
  isSubmitting = false;
  const btn = document.getElementById('submitBtn');
  btn.disabled = false;
  btn.innerHTML = '↑';
}

function showStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = `status-msg show ${type}`;
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ── RENDER ───────────────────────────────────────────────
function renderAll() {
  renderCounters();
  renderCloud();
  renderPosts();
}

function renderCounters() {
  const today = new Date().toDateString();
  document.getElementById('totalCount').textContent = posts.length;
  document.getElementById('todayCount').textContent = posts.filter(p => p.date === today).length;

  // top emoji
  const freq = {};
  posts.forEach(p => freq[p.emoji] = (freq[p.emoji]||0)+1);
  const top = Object.entries(freq).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('topEmoji').textContent = top ? top[0] : '—';
}

function renderCloud() {
  const wrap = document.getElementById('cloudWrap');
  if (posts.length === 0) {
    wrap.innerHTML = '<div class="empty-state">첫 감정을 남겨주세요</div>';
    return;
  }

  // frequency of labels
  const freq = {};
  posts.forEach(p => {
    freq[p.label] = (freq[p.label]||0)+1;
  });

  const max = Math.max(...Object.values(freq));
  wrap.innerHTML = Object.entries(freq)
    .sort((a,b)=>b[1]-a[1])
    .map(([label, count]) => {
      const size = 12 + Math.round((count/max)*16);
      const emoji = posts.find(p=>p.label===label)?.emoji || '';
      const color = posts.find(p=>p.label===label)?.color || COLORS[0];
      return `<span class="cloud-word" style="font-size:${size}px;background:${color};padding:${4+count}px ${8+count*2}px">
        ${emoji} ${label} <span style="font-size:10px;opacity:0.7">${count}</span>
      </span>`;
    }).join('');
}

function renderPosts() {
  const list = document.getElementById('postsList');
  if (posts.length === 0) {
    list.innerHTML = '<div class="empty-state">아직 아무도 없어요 — 첫 번째가 돼요!</div>';
    return;
  }

  list.innerHTML = posts.slice(0, 20).map(p => `
    <div class="post-card">
      <div class="post-emoji">${p.emoji}</div>
      <div class="post-body">
        ${p.text ? `<div class="post-text">${escHtml(p.text)}</div>` : ''}
        <div class="post-meta">
          <span class="post-tag" style="background:${p.color}20;color:${p.color}">${p.label}</span>
          <span>${p.time}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 초기 더미 데이터
posts = [
  { emoji:'😴', label:'졸림', text:'버스 빨리 와라', time:'09:31', date:new Date().toDateString(), color:'#b0c4de' },
  { emoji:'😊', label:'기분좋음', text:'오늘 날씨 좋다', time:'09:28', date:new Date().toDateString(), color:'#f0c040' },
  { emoji:'😤', label:'짜증남', text:'', time:'09:20', date:new Date().toDateString(), color:'#f08080' },
  { emoji:'😌', label:'평온함', text:'그냥 살만하다', time:'08:55', date:new Date().toDateString(), color:'#a8d8a0' },
];
renderAll();
</script>
</body>
</html>
